kind = "web"
previewPath = "/"
title = "SHOP Quote"
version = "1.0.0"
id = "artifacts/shop-quote"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20335

[services.development]
run = "pnpm --filter @workspace/shop-quote run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/shop-quote", "run", "build" ]
publicDir = "artifacts/shop-quote/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20335"
BASE_PATH = "/"
